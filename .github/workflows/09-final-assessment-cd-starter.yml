name: 09 Final Assessment CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: tiny-health-app
  APP_PORT: "8000"

jobs:
  build-and-push:
    name: Build and push release image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.image-tag.outputs.value }}
      image_ref: ${{ steps.image-ref.outputs.value }}

    steps:
      - name: Check required GitHub secrets
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          for secret in \
            REGISTRY_HOST \
            REGISTRY_USERNAME \
            REGISTRY_PASSWORD \
            DEPLOY_HOST \
            DEPLOY_USER \
            DEPLOY_SSH_KEY
          do
            if [ -z "${!secret}" ]; then
              echo "::error::$secret is missing"
              exit 1
            fi
          done

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create image tag
        id: image-tag
        run: |
          TAG="$(date -u +'%Y%m%d-%H%M%S')-${GITHUB_RUN_ID}"
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create full image reference
        id: image-ref
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
        run: |
          IMAGE_REF="${REGISTRY_HOST}/${IMAGE_NAME}:${{ steps.image-tag.outputs.value }}"
          echo "value=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Show image reference
        run: |
          echo "Image: ${{ steps.image-ref.outputs.value }}"

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image-ref.outputs.value }}

  deploy-to-host:
    name: Deploy to remote host
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy image over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
          COMMIT_SHA: ${{ github.sha }}
          APP_PORT: ${{ env.APP_PORT }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: REGISTRY_HOST,REGISTRY_USERNAME,REGISTRY_PASSWORD,IMAGE_TAG,IMAGE_REF,COMMIT_SHA,APP_PORT
          script: |
            set -e

            docker --version

            echo "$REGISTRY_PASSWORD" | docker login \
              "$REGISTRY_HOST" \
              -u "$REGISTRY_USERNAME" \
              --password-stdin

            docker pull "$IMAGE_REF"

            docker rm -f tiny-health-app || true

            docker run -d \
              --name tiny-health-app \
              --restart unless-stopped \
              -p ${APP_PORT}:8000 \
              -e APP_ENV=production \
              -e APP_VERSION="${IMAGE_TAG}" \
              -e COMMIT_SHA="${COMMIT_SHA}" \
              -e DEPLOYED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
              -e IMAGE_TAG="${IMAGE_TAG}" \
              -e DEPLOY_MODE=github-actions \
              "$IMAGE_REF"

            echo "Waiting for application..."

            for i in {1..30}; do
              if curl -fs http://127.0.0.1:${APP_PORT}/health; then
                break
              fi
              sleep 2
            done

            echo "Health:"
            curl -fs http://127.0.0.1:${APP_PORT}/health

            echo
            echo "Version:"
            curl -fs http://127.0.0.1:${APP_PORT}/version

            echo
            echo "Status:"
            curl -fs http://127.0.0.1:${APP_PORT}/status

      - name: Validate deployed app from GitHub Actions
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          APP_PORT: ${{ env.APP_PORT }}
        run: |
          echo "Health"
          curl --fail http://${HOST}:${APP_PORT}/health

          echo
          echo "Version"
          curl --fail http://${HOST}:${APP_PORT}/version

          echo
          echo "Status"
          curl --fail http://${HOST}:${APP_PORT}/status